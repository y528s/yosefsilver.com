<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yosef Silver</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #F6F2E9;
      --ink: #1A1A1A;
      --ink-muted: #6A6A6A;
      --accent: #2E6F6A;
      --plum: #7A5C7E;
      --border: rgba(26,26,26,0.1);
      --white: #FFFFFF;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Placeholder sections */
    #nav { min-height: 60px; }
    #hero { min-height: 200px; padding-top: 100px; }
    #about { min-height: 200px; }
    #photo { min-height: 200px; }
    #map { min-height: 200px; }
    #work { min-height: 200px; }
    #social { min-height: 200px; }
    #email-capture { min-height: 200px; }
    #contact { min-height: 200px; }
    #footer { min-height: 80px; }
  </style>
</head>
<body>

  <nav id="nav"></nav>

  <div class="container">
    <section id="hero"></section>
    <section id="about"></section>
    <section id="photo"></section>
    <section id="map"></section>
    <section id="work"></section>
    <section id="social"></section>
  </div>

  <section id="email-capture"></section>

  <div class="container">
    <section id="contact"></section>
  </div>

  <footer id="footer"></footer>

</body>
</html>
