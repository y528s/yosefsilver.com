<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yosef Silver</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --ink: #1A1A1A;
      --ink-muted: #6A6A6A;
      --accent: #2E6F6A;
      --plum: #7A5C7E;
      --border: rgba(26,26,26,0.1);
    }

    body {
      background: #F6F2E9;
      font-family: 'Inter', sans-serif;
      color: var(--ink);
      max-width: 680px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div id="nav"></div>
  <div id="hero"></div>
  <div id="about"></div>
  <div id="photo"></div>
  <div id="map"></div>
  <div id="work"></div>
  <div id="social"></div>
  <div id="email"></div>
  <div id="contact"></div>
  <div id="footer"></div>
</body>
</html>
